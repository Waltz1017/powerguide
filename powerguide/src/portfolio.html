<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings</title>
    <link href="./output.css" rel="stylesheet">
</head>
<body>
    <section class="font-montserrat font-bold">
        <div class="flex flex-col w-screen min-h-screen items-center">
            <img src="/img/portfoliobg.png" class="absolute inset-0 z-0 w-full h-full object-cover">

            <!-- Navbar -->
            <div class="flex h-16 sm:h-20 w-full z-10 border-b-2 border-white/50 text-white px-4">
                <a href="">
                    <button class="flex justify-center items-center
                        text-black bg-[#FFBB02] rounded-full
                        my-3 sm:my-5 h-[36px] sm:h-[40px] w-[130px] sm:w-[150px]
                        text-sm sm:text-base border-2 cursor-pointer">
                        Back to Home
                    </button>
                </a>
            </div>

            <br>

            <!-- Main Card -->
            <div class="flex flex-col border rounded-[20px] sm:rounded-[25px]
                shadow-[0_0_20px_#FFCA41] border-amber-200
                z-10 m-4 sm:m-6 lg:m-10
                w-[95vw] sm:w-[90vw] lg:w-[973px]
                bg-[#0C0D2A]/[48%]
                pb-4">

                <!-- Card Header -->
                <div class="pt-4 sm:pt-5 pl-4 sm:pl-5">
                    <span class="text-white text-3xl sm:text-4xl lg:text-5xl">
                        PROFILE SETTINGS
                    </span><br>
                    <span class="text-white/50 font-thin text-sm sm:text-base lg:text-lg">
                        Manage your identity and security protocols.
                    </span>
                </div>

                <!-- Inner Panel -->
                <div class="flex flex-col items-center justify-center pt-2 px-2 sm:px-3">
                    <div class="flex flex-col bg-[#394760]/[60%]
                        rounded-[20px] sm:rounded-[27px]
                        w-full
                        py-2">

                        <!-- Basic Information Header -->
                        <div class="flex flex-row gap-2 px-4 sm:px-5 py-4 sm:py-5 items-center">
                            <img class="w-[28px] h-[28px] sm:w-[34px] sm:h-[34px]" src="/img/profile.png" alt="">
                            <span class="text-white text-sm sm:text-base">
                                BASIC INFORMATION
                            </span>
                        </div>

                        <!-- Basic Info Fields -->
                        <div class="px-4 sm:px-5">
                            <div class="flex flex-col sm:flex-row gap-4 sm:justify-evenly">
                                <div class="flex flex-col w-full sm:w-[48%]">
                                    <span class="text-white py-1 font-thin text-sm">Full Name</span>
                                    <input class="border h-10 border-white rounded-lg text-white font-thin px-3 bg-transparent text-sm"
                                        type="text" placeholder="John C. Doe">
                                </div>
                                <div class="flex flex-col w-full sm:w-[48%]">
                                    <span class="text-white py-1 text-sm font-thin">Contact Number</span>
                                    <input class="border h-10 border-white rounded-lg text-white font-thin px-3 bg-transparent text-sm"
                                        type="text" placeholder="+63 912 123 4567">
                                </div>
                            </div>

                            <br>

                            <div class="flex flex-col items-center border-b-2 border-[#AFAFAF] py-4 sm:py-5">
                                <button class="cursor-pointer w-full h-[42px] sm:h-[46px] text-white rounded-lg bg-[#364057] text-sm sm:text-base">
                                    Update Basic Profile
                                </button>
                            </div>
                        </div>

                        <!-- Security Header -->
                        <div class="flex flex-col">
                            <div class="flex flex-row gap-2 px-4 sm:px-5 py-4 sm:py-5 items-center">
                                <img class="w-[28px] h-[28px] sm:w-[34px] sm:h-[34px]" src="/img/lock.png" alt="">
                                <span class="text-white text-sm sm:text-base">
                                    SECURITY AND PASSWORD
                                </span>
                            </div>
                        </div>

                        <!-- Password Fields -->
                        <div class="px-4 sm:px-5">
                            <div class="flex flex-col sm:flex-row gap-4 sm:justify-evenly">
                                <div class="flex flex-col w-full sm:w-[48%]">
                                    <span class="text-white py-1 font-thin text-sm">New Password</span>
                                    <input class="border h-10 border-white rounded-lg text-white font-thin px-3 bg-transparent text-sm"
                                        type="password" placeholder="********">
                                </div>
                                <div class="flex flex-col w-full sm:w-[48%]">
                                    <span class="text-white py-1 text-sm font-thin">Confirm Password</span>
                                    <input class="border h-10 border-white rounded-lg text-white font-thin px-3 bg-transparent text-sm"
                                        type="password" placeholder="********">
                                </div>
                            </div>

                            <br>

                            <div class="flex flex-col items-center py-4 sm:py-5">
                                <button class="cursor-pointer w-full h-[42px] sm:h-[46px] rounded-lg bg-[#FFBB02] text-sm sm:text-base">
                                    Change Password
                                </button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
