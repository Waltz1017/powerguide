<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POWERGUIDE</title>
    <link href="./output.css" rel="stylesheet">
</head>
<body class="font-montserrat font-bold">
    <div class="relative">
        <img src="/img/landingbg.png" alt="" class="h-screen absolute inset-0 w-full object-cover">
        <div class="relative z-10 flex flex-col">
            <header class="flex flex-row border-b border-gray-500 w-screen h-20 md:h-25 text-2xl items-center justify-between px-4 md:px-0">
                
                <div class="flex">
                    <img class="w-14 md:w-20" src="/img/logo.png" alt="">
                    <div class="flex flex-col justify-center">
                        <span class="text-white text-lg md:text-2xl">POWER<span class="text-yellow-500">GUIDE</span></span>
                        <span class="text-white text-xs md:text-sm font-thin">SECURITY AND RELIABILITY</span>
                    </div>
                </div>

                <ul class="hidden md:flex flex-row gap-20 ml-auto m-10 text-gray-400 text-base">
                    <li class=""><a href="">Features</a></li>
                    <li><a href="">About</a></li>
                    <li><a href="">Tech Stack</a></li>
                </ul>

                <div class="flex gap-3 md:gap-10 p-4 md:p-10 text-sm md:text-base">
                    <a href="">
                        <button class="flex items-center justify-center px-4 md:px-6 py-2 md:py-3 bg-yellow-500 text-black rounded-full">
                            Login
                        </button>
                    </a>
                    <a href="">
                        <button class="flex items-center justify-center rounded-full px-4 md:px-6 py-2 md:py-3 bg-gray-300 opacity-40 text-white">
                            Sign Up
                        </button>
                    </a>
                </div>
            </header>
        </div>

        <div class="flex flex-col text-white h-screen text-center justify-center absolute inset-0 z-30 px-4">
            
            <div class="flex m-5 justify-center">
                <p class="flex justify-center items-center px-1 before:content-['•']
                    before:text-yellow-500 before:text-3xl 
                    before:mr-2 border-2 rounded-full border-yellow-500 
                    text-yellow-500 text-xs md:text-sm">
                    ACTIVE MONITORING IN DAGUPAN
                </p>
            </div><br>

            <div>
                <span class="text-4xl md:text-6xl lg:text-7xl font-bold leading-tight">
                    When Power Fails,<br>Power<span class="text-yellow-500">Guide</span> Prevails
                </span><br><br>
                <p class="text-gray-300 text-sm md:text-base font-normal px-4 md:px-0">
                    Stay informed with real-time outage tracking and smart <br class="hidden md:block"> battery management for the modern dagupeño lifestyle.
                </p><br><br>
            </div>

            <div class="flex justify-center gap-4 md:gap-20 flex-wrap">
                <button class="px-4 py-3 rounded-lg bg-yellow-500 
                    text-black text-sm md:text-base">
                    Get Started for Free
                </button>
                <button class="px-5 py-3 rounded-lg bg-gray-300 
                    text-black opacity-40 text-sm md:text-base">
                    Report Outage
                </button>
            </div>
        </div>
    </div>
</body>
</html>
